<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>النظام البنكي الاحترافي</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: "Segoe UI", Tahoma, sans-serif;
  background: linear-gradient(135deg,#141e30,#243b55);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  direction: rtl;
}

/* الكرت */
.card{
  background:white;
  padding:30px;
  width:380px;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.3);
  animation: fadeIn 0.4s ease-in-out;
}

h2{
  text-align:center;
  margin-bottom:20px;
  color:#243b55;
}

/* الحقول */
/* ===== الحقول ===== */

input{
  width:100%;
  padding:14px 14px 14px 40px;
  margin:10px 0;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:14px;
  background:#f9fafc;
  transition: all 0.25s ease;
  box-sizing:border-box;
}

/* عند التركيز */
input:focus{
  border-color:#2a5298;
  background:white;
  outline:none;
  box-shadow:0 0 0 3px rgba(42,82,152,0.15);
  transform:translateY(-1px);
}

/* Placeholder */
input::placeholder{
  color:#999;
  font-size:13px;
}

/* تأثير عند المرور */
input:hover{
  border-color:#aaa;
}

/* حقل رقم المبلغ */
#amount{
  font-weight:bold;
  letter-spacing:0.5px;
}
</style>
</head>

<body>

<div class="card" id="authCard">
<h2>تسجيل / دخول</h2>

<input type="text" id="username" placeholder="اسم الحساب (انجليزي)">
<input type="password" id="password" placeholder="كلمة المرور">

<button id="registerBtn" onclick="register()">إنشاء حساب</button>
<button id="loginBtn" onclick="login()">تسجيل الدخول</button>

<div class="loading" id="authLoading">جاري المعالجة...</div>
</div>

<div class="card" id="bankCard" style="display:none">
<h2>حسابي البنكي</h2>

<div class="balance">الرصيد: <span id="balance">0</span></div>

<input type="number" id="amount" placeholder="المبلغ">
<button id="depositBtn" onclick="deposit()">إيداع</button>
<button id="withdrawBtn" onclick="withdraw()">سحب</button>

<div class="transactions" id="transactions"></div>

<button onclick="logout()">تسجيل خروج</button>
</div>

<script src="bank.js"></script>
</body>
</html>
