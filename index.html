<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النظام البنكي الخاص - علاء الدين</title>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:"Segoe UI",Tahoma;
background:linear-gradient(135deg,#141e30,#243b55);
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
margin:0;
padding:20px 0;
direction:rtl;
}

.card{
background:white;
padding:30px;
width:380px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

h2{
text-align:center;
color:#243b55;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ddd;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

#loginBtn{background:#43a047;color:white;}
#registerBtn{background:#1e88e5;color:white;}
#depositBtn{background:#2ecc71;color:white;}
#withdrawBtn{background:#e74c3c;color:white;}

.balance{
font-size:22px;
text-align:center;
margin:15px 0;
font-weight:bold;
}

.account-box{
display:flex;
align-items:center;
gap:12px;
background:linear-gradient(135deg,#243b55,#141e30);
padding:15px;
border-radius:15px;
color:white;
margin-bottom:15px;
}

.avatar-circle{
width:45px;
height:45px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

thead{
background:#243b55;
color:white;
}

</style>
</head>

<body>

<!-- تسجيل الدخول -->
<!-- تسجيل الدخول -->
<div class="card" id="authCard">

  <!-- شاشة تسجيل الدخول -->
  <div id="loginView">

    <h2>تسجيل الدخول</h2>

    <input type="text" id="username" placeholder="اسم الحساب (انجليزي)">
    <input type="password" id="password" placeholder="كلمة المرور">

    <button id="loginBtn" onclick="login()">تسجيل الدخول</button>

    <p style="text-align:center;margin-top:15px;">
      ليس لديك حساب؟
      <a href="#" onclick="showRegister()">إنشاء حساب</a>
    </p>

  </div>

  <!-- شاشة إنشاء حساب -->
  <div id="registerView" style="display:none;">

    <h2>إنشاء حساب جديد</h2>

    <input type="text" id="usernameReg" placeholder="اسم الحساب (انجليزي)">
    <input type="password" id="passwordReg" placeholder="كلمة المرور">
    <input type="text" id="fullName" placeholder="الاسم الكامل">
    <input type="text" id="accountName" placeholder="اسم الحساب البنكي">

    <button id="registerBtn" onclick="register()">إنشاء حساب</button>

    <p style="text-align:center;margin-top:15px;">
      لديك حساب بالفعل؟
      <a href="#" onclick="showLogin()">تسجيل الدخول</a>
    </p>

  </div>

  <!-- مؤشر التحميل -->
  <div class="loading" id="authLoading" style="display:none;">
    جاري المعالجة...
  </div>

</div>

<!-- النظام البنكي -->
<div class="card" id="bankCard" style="display:none">

<h2>حسابي البنكي</h2>

<div class="account-box">

<div class="avatar-circle">👤</div>

<div>
<div id="welcomeName"></div>
<div id="accountNameDisplay"></div>
</div>

</div>

<div class="balance">
الرصيد: <span id="balance">0</span>
</div>


<input type="number" id="amount" placeholder="المبلغ">
<input type="text" id="description" placeholder="وصف العملية">

<button id="depositBtn" onclick="deposit()">إيداع</button>
<button id="withdrawBtn" onclick="withdraw()">سحب</button>

<hr>

<h3>فلترة كشف الحساب</h3>

<input type="date" id="fromDate">
<input type="date" id="toDate">

<button onclick="filterTransactions()">عرض العمليات</button>

<hr>

<h3>العمليات</h3>

<table>

<thead>
<tr>
<th>التاريخ</th>
<th>النوع</th>
<th>المبلغ</th>
<th>الوصف</th>
</tr>
</thead>

<tbody id="transactionsBody"></tbody>

</table>


<!-- منطقة الطباعة -->
<div id="printArea" style="display:none; direction:rtl; font-family:Arial; width:190mm; padding:15mm; box-sizing:border-box;">

<h2 style="text-align:center;">🏦 بنك ABM</h2>

<p id="pdfFullName"></p>
<p id="pdfAccountName"></p>
<p id="pdfBalance"></p>
<p id="pdfDate"></p>

<hr>

<table border="1" style="width:100%; border-collapse:collapse; text-align:center;">

<thead>
<tr>
<th>التاريخ</th>
<th>النوع</th>
<th>المبلغ</th>
<th>الوصف</th>
</tr>
</thead>

<tbody id="pdfTransactionsBody"></tbody>

</table>

</div>
<button onclick="downloadPDF()">طباعة كشف الحساب</button>

<button onclick="logout()">تسجيل خروج</button>

</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script src="bank.js"></script>

</body>
</html>
