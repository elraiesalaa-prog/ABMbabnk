<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABM Bank</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="card">
<h2>🏦 ABM Bank</h2>

<div id="auth">
<button type="button" onclick="alert('الزر يعمل')">اختبار الزر</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="bank.js"></script>
</div>

<div id="dashboard" style="display:none;">
<h3>رقم الحساب: <span id="accountNumber"></span></h3>
<h2>الرصيد: <span id="balance"></span> جنيه</h2>

<input type="number" id="amount" placeholder="المبلغ">
<button onclick="deposit()">إيداع</button>
<button onclick="withdraw()">سحب</button>

<h3>تحويل</h3>
<input type="text" id="receiverAccount" placeholder="رقم حساب المستلم">
<input type="number" id="transferAmount" placeholder="المبلغ">
<button onclick="transfer()">تحويل</button>

<h3>كشف الحساب</h3>
<input type="date" id="fromDate">
<input type="date" id="toDate">
<button onclick="loadStatement()">عرض</button>

<ul id="transactions"></ul>

<button onclick="logout()">خروج</button>
</div>

</div>

<script src="bank.js"></script>
</body>
</html>
