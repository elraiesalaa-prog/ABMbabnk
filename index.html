<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>النظام البنكي الاحترافي</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: "Segoe UI", Tahoma, sans-serif;
  background: linear-gradient(135deg,#141e30,#243b55);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  direction: rtl;
}

/* الكرت */
.card{
  background:white;
  padding:30px;
  width:380px;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.3);
  animation: fadeIn 0.4s ease-in-out;
}

h2{
  text-align:center;
  margin-bottom:20px;
  color:#243b55;
}

/* الحقول */
/* ===== الحقول ===== */

input{
  width:100%;
  padding:14px 14px 14px 40px;
  margin:10px 0;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:14px;
  background:#f9fafc;
  transition: all 0.25s ease;
  box-sizing:border-box;
}

/* عند التركيز */
input:focus{
  border-color:#2a5298;
  background:white;
  outline:none;
  box-shadow:0 0 0 3px rgba(42,82,152,0.15);
  transform:translateY(-1px);
}

/* Placeholder */
input::placeholder{
  color:#999;
  font-size:13px;
}

/* تأثير عند المرور */
input:hover{
  border-color:#aaa;
}

/* حقل رقم المبلغ */
#amount{
  font-weight:bold;
  letter-spacing:0.5px;
}
  
/* الأزرار */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
  font-size:14px;
}

#registerBtn{
  background:#1e88e5;
  color:white;
}

#loginBtn{
  background:#43a047;
  color:white;
}

#depositBtn{
  background:#2ecc71;
  color:white;
}

#withdrawBtn{
  background:#e74c3c;
  color:white;
}

button:hover{
  transform:translateY(-2px);
  opacity:0.9;
}

button:disabled{
  background:gray;
  cursor:not-allowed;
}

/* الرصيد */
.balance{
  font-size:24px;
  text-align:center;
  margin:15px 0;
  font-weight:bold;
  color:#243b55;
}

/* المعاملات */
.transactions{
  max-height:170px;
  overflow:auto;
  background:#f8f9fa;
  padding:12px;
  border-radius:10px;
  margin-top:15px;
  font-size:14px;
}

.transactions div{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  border-bottom:1px solid #eee;
}

.transactions div:last-child{
  border-bottom:none;
}

.loading{
  text-align:center;
  display:none;
  margin-top:10px;
  font-size:14px;
  color:#243b55;
}

/* حركة دخول */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}
  /* ===== صندوق معلومات الحساب ===== */

.account-box{
  display:flex;
  align-items:center;
  gap:12px;
  background:linear-gradient(135deg,#243b55,#141e30);
  padding:15px;
  border-radius:15px;
  color:white;
  margin-bottom:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.avatar-circle{
  width:45px;
  height:45px;
  border-radius:50%;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
}

.account-text{
  display:flex;
  flex-direction:column;
}

.welcome-name{
  font-weight:bold;
  font-size:15px;
}

.account-name{
  font-size:13px;
  opacity:0.8;
}
</style>
</head>

<body>

<!-- كرت تسجيل الدخول -->
<div class="card" id="authCard">

  <!-- شاشة الدخول -->
  <div id="loginView">
    <h2>تسجيل الدخول</h2>
    <input type="text" id="username" placeholder="اسم الحساب (انجليزي)">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button id="loginBtn" onclick="login()">تسجيل الدخول</button>

    <p style="text-align:center;margin-top:15px;">
      ليس لديك حساب؟
      <a href="#" onclick="showRegister()">إنشاء حساب</a>
    </p>
  </div>

  <!-- شاشة التسجيل -->
  <div id="registerView" style="display:none;">
    <h2>إنشاء حساب جديد</h2>
    <input type="text" id="usernameReg" placeholder="اسم الحساب (انجليزي)">
    <input type="password" id="passwordReg" placeholder="كلمة المرور">
    <input type="text" id="fullName" placeholder="الاسم الكامل">
    <input type="text" id="accountName" placeholder="اسم الحساب البنكي">

    <button id="registerBtn" onclick="register()">إنشاء حساب</button>

    <p style="text-align:center;margin-top:15px;">
      لديك حساب بالفعل؟
      <a href="#" onclick="showLogin()">تسجيل الدخول</a>
    </p>
  </div>

  <div class="loading" id="authLoading">جاري المعالجة...</div>

</div>


<!-- كرت البنك (منفصل تماماً) -->
<div class="card" id="bankCard" style="display:none">
<h2>حسابي البنكي</h2>

<div id="accountInfo" class="account-box">
  <div class="avatar-circle">👤</div>
  <div class="account-text">
    <div id="welcomeName" class="welcome-name"></div>
    <div id="accountNameDisplay" class="account-name"></div>
  </div>
</div>

<div class="balance">الرصيد: <span id="balance">0</span></div>

<input type="number" id="amount" placeholder="المبلغ">
<input type="text" id="description" placeholder="بيان العملية (سبب الإيداع أو السحب)">

<button id="depositBtn" onclick="deposit()">إيداع</button>
<button id="withdrawBtn" onclick="withdraw()">سحب</button>

<!-- ================= كشف الحساب في الصفحة ================= -->

<h3>كشف الحساب</h3>

<table id="transactionsTable"
       border="1"
       style="width:100%; border-collapse:collapse; text-align:center;">

  <thead>
    <tr>
      <th>التاريخ</th>
      <th>النوع</th>
      <th>المبلغ</th>
      <th>الوصف</th>
    </tr>
  </thead>

  <tbody id="transactionsBody"></tbody>

</table>


<!-- ================= منطقة الطباعة PDF (مخفية) ================= -->

<<div id="printArea"
     style="display:none;
            direction:rtl;
            font-family:Arial;
            width:190mm;
            padding:15mm;
            box-sizing:border-box;">

  <div style="text-align:center; margin-bottom:10mm;">
    <h2 style="margin:0;">🏦 بنك ABM</h2>
    <p style="margin:3px 0;" id="pdfFullName"></p>
    <p style="margin:3px 0;" id="pdfAccountName"></p>
    <p style="margin:3px 0;" id="pdfBalance"></p>
    <p style="margin:3px 0;" id="pdfDate"></p>
    <hr>
  </div>

  <table border="1"
       style="width:100%;
              border-collapse:collapse;
              text-align:center;
              table-layout:fixed;">

  <thead style="display:table-header-group;">
    <tr>
      <th>التاريخ</th>
      <th>النوع</th>
      <th>المبلغ</th>
      <th>الوصف</th>
    </tr>
  </thead>

  <tbody id="pdfTransactionsBody"></tbody>

</table>

</div>
  <button onclick="downloadPDF()">تحميل كشف الحساب PDF</button>
<button onclick="logout()">تسجيل خروج</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="bank.js"></script>
</body>
</html>
