<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>النظام البنكي الاحترافي</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.card{
  background:white;
  padding:30px;
  border-radius:15px;
  width:350px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#2a5298;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#1e3c72;
}

.balance{
  font-size:22px;
  font-weight:bold;
  text-align:center;
  margin:15px 0;
}
</style>

</head>

<body>

<div class="card" id="authCard">
<h2>تسجيل / دخول</h2>

<input type="text" id="username" placeholder="اسم الحساب (انجليزي)">
<input type="password" id="password" placeholder="كلمة المرور">

<button id="registerBtn" onclick="register()">إنشاء حساب</button>
<button id="loginBtn" onclick="login()">تسجيل الدخول</button>

<div class="loading" id="authLoading">جاري المعالجة...</div>
</div>

<div class="card" id="bankCard" style="display:none">
<h2>حسابي البنكي</h2>

<div class="balance">الرصيد: <span id="balance">0</span></div>

<input type="number" id="amount" placeholder="المبلغ">
<button id="depositBtn" onclick="deposit()">إيداع</button>
<button id="withdrawBtn" onclick="withdraw()">سحب</button>

<div class="transactions" id="transactions"></div>

<button onclick="logout()">تسجيل خروج</button>
</div>

<script src="bank.js"></script>
</body>
</html>
