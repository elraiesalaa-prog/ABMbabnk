<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النظام البنكي الخاص - علاء الدين</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:"Segoe UI",Tahoma,sans-serif;
background:linear-gradient(135deg,#141e30,#243b55);
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
margin:0;
padding:20px 0;
direction:rtl;
}

.card{
background:white;
padding:30px;
width:420px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
animation:fadeIn 0.4s ease-in-out;
}

h2{
text-align:center;
margin-bottom:20px;
color:#243b55;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:12px;
border:1px solid #ddd;
font-size:14px;
background:#f9fafc;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

#registerBtn{background:#1e88e5;color:white;}
#loginBtn{background:#43a047;color:white;}
#depositBtn{background:#2ecc71;color:white;}
#withdrawBtn{background:#e74c3c;color:white;}

.balance{
font-size:24px;
text-align:center;
margin:15px 0;
font-weight:bold;
color:#243b55;
}

.account-box{
display:flex;
align-items:center;
gap:12px;
background:linear-gradient(135deg,#243b55,#141e30);
padding:15px;
border-radius:15px;
color:white;
margin-bottom:15px;
}

.avatar-circle{
width:45px;
height:45px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
font-size:13px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#243b55;
color:white;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<!-- تسجيل الدخول -->

<div class="card" id="authCard">

<div id="loginView">
<h2>تسجيل الدخول</h2>

<input type="text" id="username" placeholder="اسم الحساب">
<input type="password" id="password" placeholder="كلمة المرور">

<button id="loginBtn" onclick="login()">تسجيل الدخول</button>

<p style="text-align:center;margin-top:15px;">
ليس لديك حساب؟
<a href="#" onclick="showRegister()">إنشاء حساب</a>
</p>

</div>

<div id="registerView" style="display:none">

<h2>إنشاء حساب</h2>

<input type="text" id="usernameReg" placeholder="اسم الحساب">
<input type="password" id="passwordReg" placeholder="كلمة المرور">
<input type="text" id="fullName" placeholder="الاسم الكامل">
<input type="text" id="accountName" placeholder="اسم الحساب البنكي">

<button id="registerBtn" onclick="register()">إنشاء حساب</button>

<p style="text-align:center;margin-top:15px;">
لديك حساب؟
<a href="#" onclick="showLogin()">تسجيل الدخول</a>
</p>

</div>

</div>


<!-- البنك -->

<div class="card" id="bankCard" style="display:none">

<h2>حسابي البنكي</h2>

<div class="account-box">

<div class="avatar-circle">👤</div>

<div>
<div id="welcomeName"></div>
<div id="accountNameDisplay"></div>
</div>

</div>

<div class="balance">
الرصيد : <span id="balance">0</span>
</div>

<input type="number" id="amount" placeholder="المبلغ">
<input type="text" id="description" placeholder="وصف العملية">

<button id="depositBtn" onclick="deposit()">إيداع</button>
<button id="withdrawBtn" onclick="withdraw()">سحب</button>

<hr>

<h3>فلترة كشف الحساب</h3>

<input type="date" id="fromDate">
<input type="date" id="toDate">

<button onclick="filterTransactions()">عرض العمليات</button>

<hr>

<!-- جدول العمليات للمستخدم -->

<h3>العمليات</h3>

<table>

<thead>
<tr>
<th>التاريخ</th>
<th>النوع</th>
<th>المبلغ</th>
<th>الوصف</th>
</tr>
</thead>

<tbody id="transactionsBody"></tbody>

</table>

<hr>

<button onclick="downloadPDF()">تحميل كشف الحساب PDF</button>

<button onclick="logout()">تسجيل خروج</button>

</div>


<!-- منطقة الطباعة فقط -->

<div id="printArea" style="display:none; direction:rtl; width:190mm; padding:15mm; font-family:Arial;">

<h2 style="text-align:center;">🏦 بنك ABM</h2>

<p id="pdfFullName"></p>
<p id="pdfAccountName"></p>
<p id="pdfBalance"></p>
<p id="pdfDate"></p>

<table>

<thead>
<tr>
<th>التاريخ</th>
<th>النوع</th>
<th>المبلغ</th>
<th>الوصف</th>
</tr>
</thead>

<tbody id="pdfTransactionsBody"></tbody>

</table>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="bank.js"></script>

</body>
</html>
