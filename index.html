<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام البنك</title>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  direction: rtl;
}

.card{
  background:white;
  padding:25px;
  border-radius:15px;
  width:350px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{text-align:center;}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#2a5298;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.balance{
  font-size:22px;
  font-weight:bold;
  text-align:center;
  margin:15px 0;
}

.transaction{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<!-- تسجيل -->
<div class="card" id="authCard">
  <h2>تسجيل / دخول</h2>
  <input id="username" placeholder="اسم الحساب">
  <input id="password" type="password" placeholder="كلمة المرور">

  <button onclick="register()">إنشاء حساب</button>
  <button onclick="login()">تسجيل دخول</button>

  <div id="authLoading" style="display:none;text-align:center;margin-top:10px;">
    جاري المعالجة...
  </div>
</div>

<!-- البنك -->
<div class="card" id="bankCard" style="display:none;">
  <h2>لوحة الحساب</h2>

  <div class="balance">
    الرصيد:
    <span id="balance">0.00 SDG</span>
  </div>

  <input id="amount" type="number" placeholder="المبلغ">

  <button onclick="deposit()">إيداع</button>
  <button onclick="withdraw()">سحب</button>

  <div id="transactions"></div>

  <button onclick="logout()">تسجيل خروج</button>
</div>

<!-- مهم جداً: تحميل الجافا في النهاية -->
<script src="bank.js"></script>

</body>
</html>
