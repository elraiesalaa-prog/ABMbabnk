<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>النظام البنكي الخاص - علاء الدين</title>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- مكتبة PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:"Segoe UI",Tahoma,sans-serif;
background:linear-gradient(135deg,#141e30,#243b55);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
direction:rtl;
}

.card{
background:white;
padding:30px;
width:380px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:20px;
color:#243b55;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ddd;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

#registerBtn{background:#1e88e5;color:white;}
#loginBtn{background:#43a047;color:white;}

.balance{
font-size:22px;
text-align:center;
margin:15px 0;
font-weight:bold;
}

.loading{
text-align:center;
display:none;
margin-top:10px;
}

.account-box{
display:flex;
align-items:center;
gap:12px;
background:linear-gradient(135deg,#243b55,#141e30);
padding:15px;
border-radius:15px;
color:white;
margin-bottom:15px;
}

.avatar-circle{
width:45px;
height:45px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
}

</style>

</head>

<body>

<!-- ================= تسجيل الدخول ================= -->

<div class="card" id="authCard">

<div id="loginView">

<h2>تسجيل الدخول</h2>

<input type="text" id="username" placeholder="اسم الحساب">
<input type="password" id="password" placeholder="كلمة المرور">

<button id="loginBtn" onclick="login()">تسجيل الدخول</button>

<p style="text-align:center">
ليس لديك حساب؟
<a href="#" onclick="showRegister()">إنشاء حساب</a>
</p>

</div>


<div id="registerView" style="display:none">

<h2>إنشاء حساب جديد</h2>

<input type="text" id="usernameReg" placeholder="اسم الحساب">
<input type="password" id="passwordReg" placeholder="كلمة المرور">
<input type="text" id="fullName" placeholder="الاسم الكامل">
<input type="text" id="accountName" placeholder="اسم الحساب البنكي">

<button id="registerBtn" onclick="register()">إنشاء حساب</button>

<p style="text-align:center">
لديك حساب بالفعل؟
<a href="#" onclick="showLogin()">تسجيل الدخول</a>
</p>

</div>

<div class="loading" id="authLoading">
جاري المعالجة...
</div>

</div>


<!-- ================= شاشة البنك ================= -->

<div class="card" id="bankCard" style="display:none">

<h2>حسابي البنكي</h2>

<div id="accountInfo" class="account-box">

<div class="avatar-circle">👤</div>

<div>
<div id="welcomeName"></div>
<div id="accountNameDisplay"></div>
</div>

</div>

<div class="balance">
الرصيد: <span id="balance">0</span>
</div>


<!-- لوحة العمليات -->
<div id="dashboard">

<h2>العمليات</h2>

<button onclick="openDeposit()">إيداع</button>
<button onclick="openWithdraw()">سحب</button>
<button onclick="showStatement()">كشف حساب</button>

</div>


<!-- شاشة الإيداع -->
<div id="depositScreen" style="display:none">

<h3>عملية إيداع</h3>

<input type="number" id="depositAmount" placeholder="المبلغ">
 <input type="text" id="description" placeholder="بيان العملية">
<button onclick="confirmDeposit()">تأكيد</button>
 <button onclick="closeDeposit()">إلغاء</button>



<!-- شاشة السحب -->
<div id="withdrawScreen" style="display:none">

<h3>عملية سحب</h3>
<button id="withdrawBtn" onclick="withdraw()">سحب</button>
//<input type="number" id="withdrawAmount" placeholder="المبلغ">
// <input type="text" id="description" placeholder="بيان العملية">
//<button onclick="confirmWithdraw()">تأكيد</button>
<button onclick="closeWithdraw()">إلغاء</button>

</div>


<!-- شاشة كشف الحساب -->
<h3>كشف الحساب</h3>

  <table border="1" style="width:100%; border-collapse:collapse; text-align:center;">
    <thead>
      <tr>
        <th>التاريخ</th>
        <th>النوع</th>
        <th>المبلغ</th>
        <th>الوصف</th>
      </tr>
    </thead>
    <tbody id="transactionsBody"></tbody>
  </table>

  <!-- منطقة الطباعة -->
  <div id="printArea" style="display:none; direction:rtl; font-family:Arial; width:190mm; padding:15mm; box-sizing:border-box;">
    <div style="text-align:center; margin-bottom:10mm;">
      <h2 style="margin:0;">🏦 بنك ABM</h2>
      
      <div style="text-align:right;">

  <p id="pdfFullName"></p>
  <p id="pdfAccountName"></p>
  <p id="pdfBalance"></p>

</div>
    </div>
    <table border="1" style="width:100%; border-collapse:collapse; text-align:center;">
      <thead>
        <tr>
          <th>التاريخ</th>
          <th>النوع</th>
          <th>المبلغ</th>
          <th>الوصف</th>
        </tr>
      </thead>
      <tbody id="pdfTransactionsBody"></tbody>
    </table>
  </div>

  <button onclick="downloadPDF()">تحميل كشف الحساب PDF</button>
<button onclick="closeStatement()">رجوع</button>

</div>


<button onclick="logout()">تسجيل خروج</button>

</div>

<script src="bank.js"></script>

</body>
</html>
